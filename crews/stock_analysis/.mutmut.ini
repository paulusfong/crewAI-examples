[mutmut]
# Paths to mutate
paths_to_mutate=src/stock_analysis/tools/calculator_tool.py

# Test command (use python3 explicitly)
runner=python3 -m pytest -x tests/tools/test_calculator_tool.py

# Paths to exclude from mutation
# (none for now, but you could exclude specific files/directories)

# Backup directory
backup_dir=.mutmut_cache

# Dict synonyms (optional, for better mutation detection)
dict_synonyms=Struct, NamedStruct
